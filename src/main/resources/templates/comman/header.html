<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta http-equiv="x-ua-compatible" content="ie=edge">
<title>Header</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet"
	href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
<link rel="stylesheet"
	href="https://use.fontawesome.com/releases/v5.4.1/css/all.css">

<style>
    /* BOOK VAULT Theme Styles - Header */
    
    /* Forces the navbar background to be dark navy. */
    .bookvault-navbar {
        background-color: #11112b !important; 
        border-bottom: 3px solid #00e5ff; /* Cyan accent line */
        padding: 12px 2rem; /* Increased side padding for better layout */
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    /* Brand Name Style - Matching Footer Exactly */
    .bookvault-brand {
        color: #00e5ff !important;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-weight: 800; /* Extra Bold like footer */
        font-size: 1.6rem;
        letter-spacing: 2px; /* Increased spacing like footer */
        text-transform: uppercase;
        margin-right: 60px; /* More space between logo and nav links */
        text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        display: flex;
        align-items: center;
    }
    
    .bookvault-brand i {
        margin-right: 12px;
        color: #ffffff;
        font-size: 1.1em;
    }

    /* Navigation Item Container - Increased Spacing */
    .bookvault-nav-item {
        margin: 0 15px; /* Increased from 5px to 15px for less congestion */
    }

    /* Modern Navigation Links */
    .bookvault-link {
        color: #d1d5db !important; /* Light Grey text */
        font-family: 'Segoe UI', sans-serif;
        font-weight: 600;
        font-size: 1rem; /* Slightly larger text */
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 10px 20px !important; /* Larger click area */
        border-radius: 6px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
    }

    .bookvault-link:hover {
        color: #ffffff !important;
        background-color: rgba(0, 229, 255, 0.15);
        box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        transform: translateY(-2px);
        text-decoration: none;
    }
    
    .bookvault-link i {
        margin-right: 10px;
        font-size: 1.1em;
        color: #00e5ff;
    }

    /* Logout Button */
    .bookvault-logout {
        border: 1px solid rgba(255, 71, 87, 0.5);
        color: #ff4757 !important;
        margin-left: 20px; /* Separate logout from other links */
    }

    .bookvault-logout i {
        color: #ff4757;
    }

    .bookvault-logout:hover {
        background-color: #ff4757;
        color: white !important;
        box-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
    }
    
    .bookvault-logout:hover i {
        color: white;
    }

    /* Mobile Menu Toggler */
    .navbar-toggler {
        border-color: rgba(0, 229, 255, 0.5);
    }
    .navbar-toggler-icon {
        background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='rgba(0, 229, 255, 1)' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
    }
</style>

</head>

<body>

	<nav th:fragment="header"
		class="navbar navbar-expand-lg navbar-dark bookvault-navbar"
        style="background-color: #11112b;">

		<a class="navbar-brand bookvault-brand" href="#">
            <i class="fas fa-layer-group"></i> BOOK VAULT
        </a>
		
		<button class="navbar-toggler" type="button" data-toggle="collapse"
			data-target="#navbarNav">
			<span class="navbar-toggler-icon"></span>
		</button>
		
		<div class="collapse navbar-collapse" id="navbarNav">
			<ul class="navbar-nav mr-auto">
				<li class="nav-item bookvault-nav-item" sec:authorize="isAuthenticated()">
					<a class="nav-link bookvault-link" href="/books">
						<i class="fas fa-book"></i> Books
					</a>
				</li>
				<li class="nav-item bookvault-nav-item" sec:authorize="isAuthenticated()">
					<a class="nav-link bookvault-link" href="/authors">
						<i class="fas fa-pen-nib"></i> Authors
					</a>
				</li>
				<li class="nav-item bookvault-nav-item" sec:authorize="isAuthenticated()">
					<a class="nav-link bookvault-link" href="/publishers">
						<i class="fas fa-building"></i> Publisher
					</a>
				</li>
				<li class="nav-item bookvault-nav-item" sec:authorize="isAuthenticated()">
					<a class="nav-link bookvault-link" href="/categories">
						<i class="fas fa-th-list"></i> Category
					</a>
				</li>
			</ul>
			<ul class="navbar-nav">
				<li class="nav-item bookvault-nav-item" sec:authorize="isAuthenticated()">
					<a class="nav-link bookvault-link bookvault-logout" th:href="@{/logout}">
						<i class="fas fa-sign-out-alt"></i> Logout
					</a>
				</li>
			</ul>
		</div>
	</nav>

</body>
</html>
